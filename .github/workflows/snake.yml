name: Generate Superior Snake Animation 🐍

on:
  # Run automatically every 12 hours to keep stats fresh
  schedule:
    - cron: "0 */12 * * *" 
  
  # Allows you to manually trigger the animation at any time from the Actions tab
  workflow_dispatch:
  
  # Run on every push to the main branch
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Step 1: Generate the Snake animations
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          # Automatically uses your GitHub username (prince19112003)
          github_user_name: ${{ github.repository_owner }}
          
          # Generates three superior formats:
          # 1. Standard Light Mode SVG with a React-Blue snake
          # 2. Dark Mode SVG with a React-Blue snake and custom dark grid
          # 3. A fallback animated GIF
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#3B82F6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#3B82F6
            dist/github-contribution-grid-snake.gif?color_snake=#3B82F6

        env:
          # A GitHub token is required to fetch the contribution calendar from the GitHub API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Step 2: Push the generated files to the "output" branch
      # (This is why the image links in your README point to the /output/ branch!)
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
